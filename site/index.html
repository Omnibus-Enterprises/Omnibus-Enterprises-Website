<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Great Things Are Coming | Under Construction</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap");

            body {
                font-family: "Inter", sans-serif;
                background-color: #0f172a;
                color: #f8fafc;
                overflow: hidden;
            }

            .caution-bar {
                background: repeating-linear-gradient(
                    -45deg,
                    #fbbf24,
                    #fbbf24 20px,
                    #1e293b 20px,
                    #1e293b 40px
                );
                height: 12px;
                width: 100%;
            }

            .animate-float {
                animation: float 6s ease-in-out infinite;
            }

            @keyframes float {
                0% {
                    transform: translateY(0px);
                }
                50% {
                    transform: translateY(-20px);
                }
                100% {
                    transform: translateY(0px);
                }
            }

            .glow {
                box-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
            }
        </style>
    </head>
    <body
        class="min-h-screen flex flex-col items-center justify-center relative"
    >
        <!-- Top Caution Bar -->
        <div class="caution-bar absolute top-0"></div>

        <!-- Background Decoration -->
        <div class="absolute inset-0 opacity-5 pointer-events-none">
            <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <pattern
                        id="grid"
                        width="40"
                        height="40"
                        patternUnits="userSpaceOnUse"
                    >
                        <path
                            d="M 40 0 L 0 0 0 40"
                            fill="none"
                            stroke="white"
                            stroke-width="1"
                        />
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#grid)" />
            </svg>
        </div>

        <main class="z-10 text-center px-6 max-w-2xl">
            <!-- Icon/Logo Placeholder -->
            <div class="mb-8 inline-block animate-float">
                <div
                    class="bg-amber-400 p-5 rounded-2xl glow transform rotate-3"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="h-16 w-16 text-slate-900"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"
                        />
                    </svg>
                </div>
            </div>

            <h1 class="text-5xl md:text-7xl font-black mb-6 tracking-tighter">
                WE'RE <span class="text-amber-400">BUILDING</span
                ><br />SOMETHING NEW.
            </h1>

            <p
                class="text-slate-400 text-lg md:text-xl mb-10 leading-relaxed font-light"
            >
                Our site is currently undergoing renovation to bring you an
                improved experience. Great things are coming—check back soon to
                see the progress.
            </p>

            <!-- Progress Indicator -->
            <div
                class="w-full bg-slate-800 rounded-full h-4 mb-4 overflow-hidden p-1"
            >
                <div
                    class="bg-amber-400 h-2 rounded-full transition-all duration-1000"
                    style="width: 75%"
                ></div>
            </div>
            <div
                class="flex justify-between text-xs font-bold text-slate-500 uppercase tracking-widest"
            >
                <span>Foundation</span>
                <span class="text-amber-400">Polishing</span>
                <span>Launch</span>
            </div>
        </main>

        <!-- Bottom Caution Bar -->
        <div class="caution-bar absolute bottom-0"></div>

        <!-- Corner Decorative Elements -->
        <div class="fixed bottom-10 right-10 opacity-20 hidden md:block">
            <svg width="100" height="100" viewBox="0 0 100 100">
                <circle
                    cx="50"
                    cy="50"
                    r="40"
                    stroke="#fbbf24"
                    stroke-width="2"
                    fill="none"
                    stroke-dasharray="10 5"
                />
            </svg>
        </div>
    </body>
</html>
